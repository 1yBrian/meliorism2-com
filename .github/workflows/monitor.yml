name: Live monitor + heartbeat

on:
  schedule:
    # 4:15 AM PDT / 3:15 AM PST — 15 min after daily-release cron
    - cron: '15 11 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify live site shows today's slug + send heartbeat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python3 _engine/scripts/monitor.py
